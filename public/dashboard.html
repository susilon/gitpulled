<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDeploy - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AutoDeploy</h1>
      <div class="user-info">
        <span id="username-display"></span>
        <a href="/account.html" id="admin-link" class="btn btn-sm btn-secondary" style="display:none">Accounts</a>
        <button class="btn btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Projects</h2>
        <button class="btn btn-sm" onclick="showAddForm()">+ Add Project</button>
      </div>

      <div id="project-form" style="display:none">
        <h3 id="form-title">Add Project</h3>
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <div class="form-group">
            <label>Project Name</label>
            <input type="text" id="proj-name" placeholder="My Project">
          </div>
          <div class="form-group">
            <label>Folder Path</label>
            <input type="text" id="proj-folder" placeholder="/path/to/repo">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Source Branch</label>
            <input type="text" id="proj-source" placeholder="main">
          </div>
          <div class="form-group">
            <label>Target Branch</label>
            <input type="text" id="proj-target" placeholder="develop">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>Compose File (optional)</label>
            <input type="text" id="proj-compose" placeholder="docker-compose.yml">
          </div>
          <div class="form-group" style="flex:1; display:flex; align-items:flex-end; gap:8px">
            <input type="checkbox" id="proj-docker" style="width:auto">
            <label for="proj-docker" style="margin:0; font-size:0.9em; color:#aaa">Docker Rebuild</label>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn" onclick="saveProject()">Save</button>
          <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
        </div>
      </div>

      <div id="projects-list">
        <p>Loading...</p>
      </div>
    </div>

    <div class="card">
      <h2>Webhook Usage</h2>
      <p>Send a POST request to trigger git operations:</p>
      <code>POST /webhook/&lt;token&gt;</code>
      <p>Each project has a unique webhook token shown in the project list.</p>
    </div>
  </div>
  <script src="js/dashboard.js"></script>
</body>
</html>
