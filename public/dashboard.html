<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDeploy - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AutoDeploy</h1>
      <div class="user-info">
        <span>v.1.0.0</span>
        <span id="username-display"></span>
        <a href="/account.html" id="admin-link" class="btn btn-sm btn-secondary" style="display:none">Accounts</a>
        <button class="btn btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Projects</h2>
        <button class="btn btn-sm" onclick="showAddForm()">+ Add Project</button>
      </div>

      <div id="projects-list">
        <p>Loading...</p>
      </div>
    </div>

    <div class="card">
      <h2>Webhook Usage</h2>
      <p>Send a POST request to trigger git operations:</p>
      <code>POST /webhook/&lt;token&gt;</code>
      <p>Each project has a unique webhook token shown in the project list.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
