version: '3.8'

services:
  autodeploy:
    build: .
    container_name: autodeploy
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Bind mount your host folders here so the container can access them
      # Add each project's git repo folder, e.g.:
      # - /home/user/projects/my-repo:/home/user/projects/my-repo
      # Or mount a parent directory to access all repos:
      - /:/host
    environment:
      - PORT=3000
      - SESSION_SECRET=your-secret-key-change-in-production
    restart: unless-stopped
